version: '3.8'

networks:
  monitoring_network:
    driver: bridge
    name: idus_monitoring_net

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

services:
  prom-http-simulator:
    image: pierrevincent/prom-http-simulator:${SIMULATOR_VERSION}
    container_name: idus-http-simulator
    ports:
      - "${SIMULATOR_PORT}:8080"
    networks:
      - monitoring_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:8080/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: idus-prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - monitoring_network
    restart: unless-stopped
    depends_on:
      prom-http-simulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3