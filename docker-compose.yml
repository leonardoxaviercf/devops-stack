networks:
  monitoring_network:
    driver: bridge
    name: idus_monitoring_net

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

services:
  prom-http-simulator:
    image: pierrevincent/prom-http-simulator:${SIMULATOR_VERSION}
    container_name: idus-http-simulator
    ports:
      - "${SIMULATOR_PORT}:8080"
    networks:
      - monitoring_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:8080/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: idus-prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
    networks:
      - monitoring_network
    restart: unless-stopped
    depends_on:
      prom-http-simulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana-alloy:
    image: grafana/alloy:${ALLOY_VERSION}
    container_name: idus-alloy
    ports:
      - "${ALLOY_PORT}:12345"
    volumes:
      - ./alloy:/etc/alloy
    command: [ "run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.alloy" ]
    networks:
      - monitoring_network
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:12345/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: idus-grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring_network
    restart: unless-stopped
    depends_on:
      grafana-alloy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3